<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Fugaz+One&family=Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">
    <title>Q4 Skills Test</title>
</head>
<style>
body {
  background-image: url('https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/74145533-e3b6-4ee6-b5fb-44245525a230/DSC06502-HDR.jpg');
  background-size: cover;
  background-repeat: no-repeat;
  min-height: 100vh;
}

.container {
  margin-top: 50px; 
  padding: 40px; 
  border-radius: 15px;
  background: rgba(186, 255, 238, 0.9); 
  box-shadow: 0 6px 18px rgba(87, 219, 217, 0.85); 
  font-family: 'Kumbh Sans', sans-serif;
  max-width: 500px;
}

.btn-custom { 
  background-color: #f56d9c; 
  color: #333333; 
  border: none; 
  padding: 10px 20px; 
  margin: 5px;
  border-radius: 5px;
}

.btn-custom:hover { 
  background-color: #efd355; 
  color: white; 
}

#status_msg {
    color: #d9534f;
    font-weight: bold;
    margin-top: 10px;
}

.icon {
    width: 300px;
	height: 300px;
	margin-left: 20px;
	margin-right: 30px;
}
</style>
<body>

<div class="container text-center">
    <p class="fw-bold display-6">Welcome!</p>
    <p>To get back on another productive task for school, kindly log-in.</p>
    <a class="text-center" href="index.html"><img src="SKILSTEST_LOGO.png" alt="" class="icon"></a>

    <div class="mb-3 mt-3 text-start">
        <label for="username">Username:</label>
        <input type="text" class="form-control" id="username" placeholder="Enter your username here">
    </div>

    <div class="mb-3 text-start">
        <label for="password">Password:</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password here">
    </div>

    <div class="d-flex justify-content-center flex-wrap mb-3 mt-3">
        <button type="button" id="loginBtn" class="btn-custom" onclick="login_page()">Login</button>
        <button type="button" class="btn-custom" onclick="window.location.reload()">Cancel</button>
    </div>

    <p id="status_msg"></p>
</div>

<script>

let attempt_counter = 0;

function login_page() {
 
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    

    let correctUser = "sunflower08";
    let correctPass = "303";
    
   
    let granted = "Welcome " + username + "!";
    let denied = "Incorrect username and/or password.";

   
    do {
  
        if (username === correctUser && password === correctPass) {
            alert(granted);
            attempt_counter = 0; 
            document.getElementById("status_msg").innerHTML = "";
            window.location.href = "notebooks.html"; 
            break; 
        } else {
         
            attempt_counter++;
            document.getElementById("status_msg").innerHTML =
                denied + "<br>Attempt " + attempt_counter + " of 3";
        }
    } while (false); 

 
    if (attempt_counter >= 3) {
        alert("Maximum attempts reached. Button locked!");
        document.getElementById("loginBtn").disabled = true; 
        document.getElementById("loginBtn").style.backgroundColor = "gray";
    }
}
</script>

</body>
</html>
